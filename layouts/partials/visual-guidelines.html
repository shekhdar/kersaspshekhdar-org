<!-- Sagacious Six Visual Guidelines (Rule 18) -->
<style>
  /* Base Typography: Serif Fonts Only */
  body, .content, .post-body {
    font-family: 'Georgia', 'Times New Roman', 'Garamond', serif;
    font-size: 1.2em; /* Within 1em-1.3em range */
    line-height: 1.5; /* Intra-paragraph spacing */
    color: #1a1a1a; /* Very dark, not pure black */
    background-color: #fafafa; /* Very light shade */
    margin: 0;
    padding: 0;
  }

  /* Headings */
  h1, .title {
    font-size: 2em;
    font-weight: bold;
    margin-bottom: 1.5em;
    color: #000000;
  }

  h2, .subtitle {
    font-size: 1.7em;
    font-weight: normal;
    text-decoration: underline; /* Optional underline */
    margin-bottom: 1.2em;
    margin-top: 1.5em;
  }

  h3, .section-head {
    font-size: 1.4em;
    font-weight: normal;
    margin-bottom: 1em;
    margin-top: 1.2em;
  }

  /* Code & Formulae: Monospace */
  code, pre, .formula {
    font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
    font-size: 0.9em;
    background-color: #f0f0f0;
    padding: 0.2em 0.4em;
    border-radius: 3px;
  }

  pre {
    padding: 1em
