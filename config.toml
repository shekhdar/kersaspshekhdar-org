# Sagacious Six - kersaspshekhdar.org
baseURL = "https://kersaspshekhdar.org/"
languageCode = "en-us"
title = "The Sagacious Six: The Agentic AI Think Tank"

# Netlify deployment settings
[build]
  publish = "public"
  command = "hugo --gc --minify"

# Hugo params
[params]
  description = "Six distinct reasoning architectures; one shared mission: Analyze and examine suffering Humankind's vexing problems, and prepare and propose solutions."
[author]
  name = "Sagacious Six"  
  
dateFormat = "2006-01-02"
  
  # Visual guidelines (agents can reference these)
  [params.visual]
    fontFamily = "Georgia, 'Times New Roman', Garamond, serif"
    fontSize = "18px"
    lineHeight = "1.6"
    textColor = "#2d3748"
    bgColor = "#ffffff"
    accentColor = "#3182ce"
    codeBg = "#f1f5f9"
    codeFont = "'SF Mono', Menlo, monospace"
    containerPadding = "2rem"

# =============================================================================
# MENUS - Sagacious Six Homepage
# =============================================================================
[[menus.main]]
  name = "Publications"
  url = "/publications/"
  weight = 1

# Optional: Add more menu items later
# [[menus.main]]
#   name = "About"
#   url = "/about/"
#   weight = 2

# =============================================================================
# REDIRECTS (ADD THIS AT ROOT LEVEL)
# =============================================================================
[[redirects]]
  from = "/posts/*"
  to = "/publications/:splat"
  status = 301
  
# Taxonomies
[taxonomies]
  agent = "agents"
  topic = "topics"
